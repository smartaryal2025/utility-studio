<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Studio</title>
    <link rel="icon" type="image/png" href="Assets/logo.png">
    <link rel="stylesheet" href="Assets/hub.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <div class="top-header">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle Menu">☰</button>
        <div class="brand">Utility Studio</div>
    </div>

    <div class="main-container">
        <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

        <div class="sidebar" id="sidebar">
            <div class="nav-section">
                <a class="nav-item active" onclick="loadTool('Projects/QR-Tools/index.html', this)">🔳 QR & Barcode Lab</a>
                <a class="nav-item" onclick="loadTool('Projects/PDF-Tools/index.html', this)">📄 PDF Toolkit</a>
                <a class="nav-item" onclick="loadTool('Projects/Image-Tools/index.html', this)">🖼️ Image Studio</a>
                <a class="nav-item" onclick="loadTool('Projects/Video-Tools/index.html', this)">🎥 Media Studio</a>
                
                <div style="margin: 1.5rem 0 0.5rem 1rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Utilities</div>
                
                <a class="nav-item" onclick="loadTool('Projects/UnitConverterWeb/index.html', this)">📏 Unit Converter</a>
                <a class="nav-item" onclick="loadTool('Projects/DateConverter/index.html', this)">📅 Date Converter</a>
                <a class="nav-item" onclick="loadTool('Projects/Uni-Tools/index.html', this)">🔣 Unicode Tools</a>
            </div>
        </div>

        <div class="workspace">
            <iframe name="toolFrame" id="toolFrame" src="Projects/QR-Tools/index.html"></iframe>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-open');
                overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('hidden');
            }
        }

        function loadTool(path, element) {
            document.getElementById('toolFrame').src = path;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if (window.innerWidth <= 768 && sidebar.classList.contains('mobile-open')) {
                toggleSidebar();
            }
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
