<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Studio | All-in-One Web Tools</title>
    <meta name="description" content="Utility Studio by Kishor Aryal: A free, secure, and offline-capable suite of web tools including PDF, Image, Video, QR, Date, and Unicode converters.">
    <meta name="keywords" content="utility studio, web tools, offline tools, pdf toolkit, image editor, video converter, Kishor Aryal, nepal">
    <meta name="author" content="Kishor Aryal">
    
    <link rel="canonical" href="https://kishoraryal.com.np/">

    <meta property="og:title" content="Utility Studio | All-in-One Web Tools">
    <meta property="og:description" content="Free, secure, and offline-capable suite of powerful web tools.">
    <meta property="og:image" content="https://kishoraryal.com.np/Assets/logo.png">
    <meta property="og:url" content="https://kishoraryal.com.np/">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="Assets/logo.png">
    <link rel="stylesheet" href="Assets/master.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body class="hub-layout">
    <button onclick="window.location.href='layout2.html'" class="btn-secondary" style="position: fixed; top: 15px; right: 15px; z-index: 9999; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">✨ Try New Dashboard</button>
    <div class="top-header">
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle Menu">☰</button>
        <div class="brand">Utility Studio</div>
    </div>

    <div class="main-container">
        <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

        <div class="sidebar" id="sidebar">
            <div class="nav-section">
                <a class="nav-item active" onclick="loadTool('Projects/QR-Tools/index.html', this)">🔳 QR & Barcode Lab</a>
                <a class="nav-item" onclick="loadTool('Projects/PDF-Tools/index.html', this)">📄 PDF Toolkit</a>
                <a class="nav-item" onclick="loadTool('Projects/Image-Tools/index.html', this)">🖼️ Image Studio</a>
                <a class="nav-item" onclick="loadTool('Projects/Video-Tools/index.html', this)">🎥 Media Studio</a>
                
                <div style="margin: 1.5rem 0 0.5rem 1rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Utilities</div>
                
                <a class="nav-item" onclick="loadTool('Projects/UnitConverterWeb/index.html', this)">📏 Unit Converter</a>
                <a class="nav-item" onclick="loadTool('Projects/DateConverter/index.html', this)">📅 Date Converter</a>
                <a class="nav-item" onclick="loadTool('Projects/Uni-Tools/index.html', this)">🔣 Unicode Tools</a>
            </div>
        </div>

        <div class="workspace">
            <iframe name="toolFrame" id="toolFrame" src="Projects/QR-Tools/index.html"></iframe>
        </div>
    </div>

<script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        function toggleSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-open');
                overlay.classList.toggle('active');
            } else {
                sidebar.classList.toggle('hidden');
            }
        }

        function loadTool(path, element) {
            // Reverted back to simple path so it works perfectly on local computer files
            document.getElementById('toolFrame').src = path;
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if (window.innerWidth <= 768 && sidebar.classList.contains('mobile-open')) {
                toggleSidebar();
            }
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }
        });
    </script>
</body>
</html>
