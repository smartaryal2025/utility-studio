<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Studio | Utility Studio</title>
    <meta name="description" content="Convert and compress video and audio files locally in your browser using FFmpeg. Fast, private, and offline Media Studio.">
    <meta name="keywords" content="video converter, audio converter, compress video, mp4 to mp3, browser ffmpeg, offline video editor">
    <meta name="author" content="Kishor Aryal">
    
    <link rel="canonical" href="https://kishoraryal.com.np/projects/video-tools/">

    <meta property="og:title" content="Media Studio | Utility Studio">
    <meta property="og:description" content="Convert and compress video and audio files locally in your browser. Fast and private.">
    <meta property="og:image" content="https://kishoraryal.com.np/assets/logo.png">
    <meta property="og:url" content="https://kishoraryal.com.np/projects/video-tools/">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="../../assets/logo.png">
    
    <link rel="stylesheet" href="../../assets/master.css">
    <link rel="stylesheet" href="libs/video-style.css">
    
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Media Studio",
        "url": "https://kishoraryal.com.np/projects/video-tools/",
        "description": "Browser-based video editing, conversion, and compression tools.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "All",
        "offers": { "@type": "Offer", "price": "0" }
    }
    </script>
    
    <script src="libs/ffmpeg.js"></script>
    <script src="libs/index.js"></script> 

</head>
<body>
    <div class="us-global-menu top-left">
        <a href="../../index.html" class="us-home-btn" title="Dashboard">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        </a>
        <div class="us-dropdown">
            <button class="us-dropbtn">Tools ▾</button>
            <div class="us-dropdown-content">
                <a href="../date-converter/index.html">📅 Date Converter</a>
                <a href="../uni-tools/index.html">🔤 Unicode Tools</a>
                <a href="../qr-tools/index.html">🔳 QR & Barcode</a>
                <a href="../pdf-tools/index.html">📄 PDF Toolkit</a>
                <a href="../image-tools/index.html">🖼️ Image Studio</a>
                <a href="../video-tools/index.html">🎬 Media Studio</a>
                <a href="../unit-converter/index.html">⚖️ Unit Converter</a>
            </div>
        </div>
    </div>
    <div class="app-container">
        <h1 class="app-header">Media Studio</h1>

        <div class="tools-grid">
            
            <section>
                <div class="section-header"><h2>Processing Queue</h2></div>
                
                <div class="drop-zone" id="dropZone">
                    <p>Drag media here<br>or <span style="color: var(--accent-primary); font-weight: bold;">click to browse</span></p>
                    <input type="file" id="fileInput" multiple accept="video/*,audio/*,.aac" style="display: none;">
                </div>
                <div id="fileQueue" class="file-queue"></div>

                <div class="control-panel" style="flex-direction: column; align-items: stretch; margin-top: 20px;">
                    
                    <div class="control-group" style="flex-direction: column; align-items: flex-start; width: 100%;">
                        <label class="control-label">Target Format</label>
                        <select id="outputFormat">
                            <optgroup label="Video Formats">
                                <option value="mp4">MP4</option>
                                <option value="mkv">MKV</option>
                                <option value="avi">AVI</option>
                                <option value="mov">MOV</option>
                                <option value="wmv">WMV</option>
                                <option value="flv">FLV</option>
                                <option value="webm">WebM</option>
                                <option value="gif">GIF Animation</option>
                            </optgroup>
                            <optgroup label="Audio Formats">
                                <option value="mp3">MP3</option>
                                <option value="aac">AAC</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="control-group" style="width: 100%; margin-top: 5px;">
                        <label style="display: flex; align-items: center; gap: 8px; color: var(--text-primary); cursor: pointer; font-size: 14px;">
                            <input type="checkbox" id="compressCheck" style="width: 16px; height: 16px;"> Heavy Compression (Video)
                        </label>
                    </div>

                    <div class="control-group" style="flex-direction: column; align-items: flex-start; width: 100%; margin-top: 5px;">
                        <label class="control-label">Crop Settings (Optional)</label>
                        <div style="display: flex; gap: 10px; width: 100%;">
                            <input type="number" id="cropW" placeholder="Width (px)">
                            <input type="number" id="cropH" placeholder="Height (px)">
                        </div>
                    </div>

                </div>

                <button id="processBtn" class="btn-primary" style="width: 100%; padding: 12px; margin-top: 15px; font-size: 15px;">🚀 Execute Engine</button>
            </section>

            <div class="right-column">
                
                <section>
                    <div class="section-header"><h2>System Terminal</h2></div>
                    <div class="terminal" id="terminal">
                        <p class="log-info">> System initialized. Awaiting files.</p>
                    </div>
                </section>

                <section>
                    <div class="section-header"><h2>Recent Exports</h2></div>
                    <div id="historyContainer">
                        <div style="color: var(--text-secondary); font-size: 14px; text-align: center; padding: 10px;">Outputs will appear here.</div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const processBtn = document.getElementById('processBtn');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileQueue = document.getElementById('fileQueue');
        let selectedFiles = [];

        function log(msg, type = 'log-info') {
            const p = document.createElement('p'); p.className = type; p.textContent = `> ${msg}`;
            terminal.appendChild(p); terminal.scrollTop = terminal.scrollHeight;
        }

        window.addEventListener('dragover', function(e) { e.preventDefault(); }, false);
        window.addEventListener('drop', function(e) { e.preventDefault(); }, false);

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--accent-primary)"; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = "var(--border-color)"; });
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--border-color)"; handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            fileQueue.innerHTML = '';
            selectedFiles.forEach(f => {
                fileQueue.innerHTML += `<div class="file-item"><span>${f.name}</span><span style="color:var(--text-secondary)">${(f.size/1048576).toFixed(1)}MB</span></div>`;
            });
            log(`Queued ${selectedFiles.length} file(s) for processing.`);
        }

        function addLocalHistory(filename, url) {
            const container = document.getElementById('historyContainer');
            if(container.innerHTML.includes('Outputs will appear here')) { container.innerHTML = ''; }
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span title="${filename}" class="history-data">${filename}</span>
                <a href="${url}" download="${filename}" class="btn-secondary" style="padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px;">Download</a>
            `;
            container.prepend(item);
        }

        processBtn.addEventListener('click', async () => {
            if (typeof crossOriginIsolated === 'undefined' || !crossOriginIsolated) {
                log('FATAL: Browser headers missing. Ensure Cloudflare _headers file is deployed.', 'log-error'); return;
            }
            if (!selectedFiles.length) return log('Error: Queue empty.', 'log-error');

            processBtn.disabled = true;

            try {
                const { FFmpeg } = window.FFmpegWASM;
                const { toBlobURL, fetchFile } = window.FFmpegUtil;
                const ffmpeg = new FFmpeg();

                ffmpeg.on('progress', ({ progress }) => { log(`Processing... ${(progress * 100).toFixed(1)}%`); });
                log('Fetching engine into memory...', 'log-info');
                
                const localBase = 'libs';
                const cloudBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.4/dist/umd';

                try {
                    await ffmpeg.load({
                        coreURL: await toBlobURL(`${localBase}/ffmpeg-core.js`, 'text/javascript'),
                        wasmURL: await toBlobURL(`${localBase}/ffmpeg-core.wasm`, 'application/wasm'),
                        classWorkerURL: await toBlobURL(`${localBase}/814.ffmpeg.js`, 'text/javascript')
                    });
                    log('Local offline engine loaded successfully!', 'log-success');
                } catch (error) {
                    log('Local file missing. Falling back to Cloud CDN...', 'log-warning'); 
                    await ffmpeg.load({
                        coreURL: await toBlobURL(`${cloudBase}/ffmpeg-core.js`, 'text/javascript'),
                        wasmURL: await toBlobURL(`${cloudBase}/ffmpeg-core.wasm`, 'application/wasm'),
                        classWorkerURL: await toBlobURL(`${cloudBase}/814.ffmpeg.js`, 'text/javascript')
                    });
                    log('Cloud engine loaded successfully!', 'log-success');
                }

                const format = document.getElementById('outputFormat').value;
                const compress = document.getElementById('compressCheck').checked;
                const cropW = document.getElementById('cropW').value;
                const cropH = document.getElementById('cropH').value;

                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    log(`--- Executing file: ${file.name} ---`);
                    
                    const inName = `input_${i}.${file.name.split('.').pop()}`;
                    const outName = `output_${i}.${format}`;
                    const finalFilename = `${file.name.substring(0, file.name.lastIndexOf('.')) || file.name}_processed.${format}`;

                    await ffmpeg.writeFile(inName, await fetchFile(file));

                    let args = ['-i', inName];
                    if (cropW) args.push('-vf', `crop=${cropW}:${cropH || cropW}`);
                    if (format === 'mp3') { args.push('-vn', '-c:a', 'libmp3lame', '-q:a', '2'); } 
                    else if (format === 'aac') { args.push('-vn', '-c:a', 'aac'); } 
                    else if (format === 'gif') { args.push('-vf', 'fps=10,scale=320:-1:flags=lanczos'); } 
                    else if (compress && ['mp4', 'mkv', 'mov', 'avi'].includes(format)) { args.push('-vcodec', 'libx264', '-crf', '28', '-preset', 'fast'); }
                    args.push(outName);
                    
                    log(`Executing: ffmpeg ${args.join(' ')}`);
                    await ffmpeg.exec(args);

                    const data = await ffmpeg.readFile(outName);
                    
                    let mimeType = `video/${format}`;
                    if (['mp3', 'aac'].includes(format)) mimeType = `audio/${format}`;
                    if (format === 'gif') mimeType = 'image/gif';

                    const blob = new Blob([data.buffer], { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    
                    addLocalHistory(finalFilename, url);
                    log(`Completed: ${file.name}`, 'log-success');
                }
            } catch (err) {
                log(`Engine Crash: ${err.message || err}`, 'log-error');
            } finally {
                processBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
