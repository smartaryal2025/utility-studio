<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali Date Converter</title>
    <link rel="icon" type="image/png" href="../../Assets/logo.png">
    <link rel="stylesheet" href="../../Assets/master.css">
</head>
<body>
    <div class="app-container">
        <h1 class="app-header">Nepali Date Converter</h1>
        
        <div class="live-date-container">
            <div id="live-date" class="live-date">
                <span class="indicator"></span>
                <span id="current-date-text">Loading today's date...</span>
            </div>
        </div>

        <main class="card-container">
            <div class="tabs">
                <button class="tab-btn main-tab active" data-tab="ad-to-bs">Convert A.D. to B.S.</button>
                <button class="tab-btn main-tab" data-tab="bs-to-ad">Convert B.S. to A.D.</button>
            </div>

            <section id="ad-to-bs" class="tab-content active">
                <form id="form-ad-to-bs">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="ad-year">Year (A.D.)</label>
                            <select id="ad-year" required></select>
                        </div>
                        <div class="input-group">
                            <label for="ad-month">Month</label>
                            <select id="ad-month" required></select>
                        </div>
                        <div class="input-group">
                            <label for="ad-day">Day</label>
                            <select id="ad-day" required></select>
                        </div>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary">Convert to B.S.</button>
                        <button type="button" class="btn-secondary reset-btn">Reset</button>
                    </div>
                </form>
            </section>

            <section id="bs-to-ad" class="tab-content">
                <form id="form-bs-to-ad">
                    <div class="input-grid">
                        <div class="input-group">
                            <label for="bs-year">साल (वि.सं.)</label>
                            <select id="bs-year" required></select>
                        </div>
                        <div class="input-group">
                            <label for="bs-month">महिना</label>
                            <select id="bs-month" required></select>
                        </div>
                        <div class="input-group">
                            <label for="bs-day">गते</label>
                            <select id="bs-day" required></select>
                        </div>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn-primary">Convert to A.D.</button>
                        <button type="button" class="btn-secondary reset-btn">Reset</button>
                    </div>
                </form>
            </section>

            <div id="output-section" class="output-card hidden">
                <div style="font-size: 13px; color: var(--text-secondary); font-weight: bold; text-transform: uppercase; margin-bottom: 12px;">Converted Date</div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 15px;">
                    <p id="result-text" class="result-text" style="margin: 0; word-break: break-word;"></p>
                    
                    <button id="copy-btn" class="btn-secondary" style="margin: 0; height: 40px; min-width: 90px;">Copy</button>
                </div>
                <div id="error-message" class="error-message hidden"></div>
            </div>
        </main>

        <main class="card-container" style="margin-top: 20px;">
            <div class="tabs">
                <button class="tab-btn cal-tab active" data-tab="cal-bs-view">Nepali Calendar (B.S.)</button>
                <button class="tab-btn cal-tab" data-tab="cal-ad-view">English Calendar (A.D.)</button>
            </div>

            <section id="cal-bs-view" class="tab-content active">
                <div class="calendar-header">
                    <button id="bs-cal-prev" class="btn-icon cal-nav-btn">&lt;</button>
                    <div class="cal-controls">
                        <select id="cal-bs-month-select" class="cal-header-select"></select>
                        <select id="cal-bs-year-select" class="cal-header-select"></select>
                    </div>
                    <button id="bs-cal-next" class="btn-icon cal-nav-btn">&gt;</button>
                </div>
                <div class="calendar-grid" id="bs-cal-grid">
                    <div class="weekday">आइत</div><div class="weekday">सोम</div><div class="weekday">मंगल</div>
                    <div class="weekday">बुध</div><div class="weekday">बिही</div><div class="weekday">शुक्र</div><div class="weekday">शनि</div>
                    <div id="bs-cal-days" class="cal-days-wrapper"></div>
                </div>
            </section>

            <section id="cal-ad-view" class="tab-content">
                <div class="calendar-header">
                    <button id="ad-cal-prev" class="btn-icon cal-nav-btn">&lt;</button>
                    <div class="cal-controls">
                        <select id="cal-ad-month-select" class="cal-header-select"></select>
                        <select id="cal-ad-year-select" class="cal-header-select"></select>
                    </div>
                    <button id="ad-cal-next" class="btn-icon cal-nav-btn">&gt;</button>
                </div>
                <div class="calendar-grid" id="ad-cal-grid">
                    <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
                    <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
                    <div id="ad-cal-days" class="cal-days-wrapper"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="libs/script.js"></script>
    <script>
        function copyWithDoubleTick(button, textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalHTML = button.innerHTML;
                
                // Matches the exact Unicode animation with text
                button.innerHTML = `<span style="color: var(--color-success); display: flex; align-items: center; justify-content: center; gap: 4px; font-weight: bold; font-size: 13px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 11L12 16L22 6M2 11L7 16L17 6"/></svg> Copied</span>`;
                
                setTimeout(() => { button.innerHTML = originalHTML; }, 2000);
            });
        }

        document.getElementById('copy-btn').addEventListener('click', function() {
            const dateText = document.getElementById('result-text').innerText;
            if(dateText) copyWithDoubleTick(this, dateText);
        });
    </script>
</body>
</html>
